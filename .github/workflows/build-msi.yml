name: Build MSI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Publish HirschNotify (self-contained win-x64)
        run: dotnet publish -c Release -r win-x64 --self-contained -p:PublishSingleFile=false HirschNotify.csproj

      - name: Restore Installer
        run: dotnet restore installer/HirschNotify.Installer.wixproj

      - name: Build Installer
        run: dotnet build -c Release installer/HirschNotify.Installer.wixproj

      - name: Locate MSI
        id: find_msi
        shell: pwsh
        run: |
          $msi = Get-ChildItem -Path installer -Recurse -Filter *.msi | Select-Object -First 1
          if (-not $msi) {
            Write-Error "No MSI was produced"
            exit 1
          }
          Write-Host "Found MSI at $($msi.FullName)"
          "msi_path=$($msi.FullName)" >> $env:GITHUB_OUTPUT
          "msi_name=$($msi.Name)" >> $env:GITHUB_OUTPUT

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: HirschNotify-Installer
          path: ${{ steps.find_msi.outputs.msi_path }}
          retention-days: 30

      - name: Create GitHub Release on tag
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.find_msi.outputs.msi_path }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
