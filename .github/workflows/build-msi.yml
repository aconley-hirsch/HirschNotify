name: Build & Release MSI

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            # Strip 'v' prefix and any pre-release suffix (e.g. v1.0.0-beta -> 1.0.0)
            VERSION="${GITHUB_REF#refs/tags/v}"
            VERSION="${VERSION%%-*}"
          else
            VERSION="0.0.0"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Building version: ${VERSION}"

      # ── Build the application ─────────────────────────
      - name: Restore HirschNotify
        run: dotnet restore HirschNotify.csproj -r win-x64

      - name: Build HirschNotify
        run: dotnet build HirschNotify.csproj -c Release -r win-x64 --no-restore

      - name: Publish HirschNotify (self-contained win-x64)
        run: dotnet publish HirschNotify.csproj -c Release -r win-x64 --self-contained --no-build -p:PublishSingleFile=false

      # ── Build the installer ───────────────────────────
      - name: Restore Installer
        run: dotnet restore installer/HirschNotify.Installer.wixproj

      - name: Build Installer
        run: dotnet build installer/HirschNotify.Installer.wixproj -c Release --no-restore -p:Version=${{ steps.version.outputs.version }}

      # ── Locate and publish the MSI ────────────────────
      - name: Locate MSI
        id: find_msi
        shell: pwsh
        run: |
          $msi = Get-ChildItem -Path installer -Recurse -Filter *.msi | Select-Object -First 1
          if (-not $msi) {
            Write-Error "No MSI was produced"
            exit 1
          }
          Write-Host "Found MSI at $($msi.FullName)"
          "msi_path=$($msi.FullName)" >> $env:GITHUB_OUTPUT
          "msi_name=$($msi.Name)" >> $env:GITHUB_OUTPUT

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: HirschNotify-Installer
          path: ${{ steps.find_msi.outputs.msi_path }}
          retention-days: 90

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.find_msi.outputs.msi_path }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
