name: Build & Release Installer

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            # Strip 'v' prefix and any pre-release suffix (e.g. v1.0.0-beta -> 1.0.0)
            VERSION="${GITHUB_REF#refs/tags/v}"
            VERSION="${VERSION%%-*}"
          else
            VERSION="0.0.0"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Building version: ${VERSION}"

      # ── Build the application ─────────────────────────
      - name: Restore HirschNotify
        run: dotnet restore HirschNotify.csproj -r win-x64

      - name: Publish HirschNotify (self-contained win-x64)
        run: dotnet publish HirschNotify.csproj -c Release -r win-x64 --self-contained --no-restore -p:PublishSingleFile=false -p:Version=${{ steps.version.outputs.version }}

      # ── Build the installer ───────────────────────────
      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y
        shell: pwsh

      - name: Build Setup.exe
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            /DMyAppVersion=${{ steps.version.outputs.version }} `
            installer\HirschNotify.iss
          if ($LASTEXITCODE -ne 0) { throw "ISCC failed with exit code $LASTEXITCODE" }

      # ── Locate and publish the EXE ────────────────────
      - name: Locate Setup.exe
        id: find_exe
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path installer\Output -Filter *.exe | Select-Object -First 1
          if (-not $exe) {
            Write-Error "No Setup.exe was produced"
            exit 1
          }
          Write-Host "Found installer at $($exe.FullName)"
          "exe_path=$($exe.FullName)" >> $env:GITHUB_OUTPUT
          "exe_name=$($exe.Name)" >> $env:GITHUB_OUTPUT

      - name: Upload Setup.exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: HirschNotify-Installer
          path: ${{ steps.find_exe.outputs.exe_path }}
          retention-days: 90

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.find_exe.outputs.exe_path }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
