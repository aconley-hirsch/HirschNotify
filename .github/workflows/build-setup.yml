name: Build & Release Installer

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # MinVer reads the nearest git tag to derive the assembly
          # version. A shallow clone (default) would hide history beyond
          # the last commit, so fetch everything.
          fetch-depth: 0

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            # Strip 'v' prefix and any pre-release suffix (e.g. v1.0.0-beta -> 1.0.0)
            VERSION="${GITHUB_REF#refs/tags/v}"
            VERSION="${VERSION%%-*}"
          else
            VERSION="0.0.0"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Building version: ${VERSION}"

      # ── Build the application ─────────────────────────
      - name: Restore HirschNotify
        run: dotnet restore HirschNotify.csproj -r win-x64

      - name: Publish HirschNotify (self-contained win-x64, single-file)
        # PublishSingleFile=true bundles the framework + app DLLs into
        # HirschNotify.exe so the install folder isn't littered with ~280
        # framework assemblies. IncludeNativeLibrariesForSelfExtract=true
        # pulls the ~90 native libs (e_sqlite3.dll, msquic.dll, etc.) into
        # the bundle too — they get extracted under %LOCALAPPDATA% on
        # first run. The plugin loader at Program.cs:82-111 keeps working
        # because AppContext.BaseDirectory for a single-file .exe resolves
        # to the directory containing the .exe (not the extract dir) as
        # long as IncludeAllContentForSelfExtract stays at its default.
        run: dotnet publish HirschNotify.csproj -c Release -r win-x64 --self-contained --no-restore -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true

      # ── Build the installer ───────────────────────────
      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y
        shell: pwsh

      - name: Build Setup.exe
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            /DMyAppVersion=${{ steps.version.outputs.version }} `
            installer\HirschNotify.iss
          if ($LASTEXITCODE -ne 0) { throw "ISCC failed with exit code $LASTEXITCODE" }

      # ── Locate and publish the EXE ────────────────────
      - name: Locate Setup.exe
        id: find_exe
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path installer\Output -Filter *.exe | Select-Object -First 1
          if (-not $exe) {
            Write-Error "No Setup.exe was produced"
            exit 1
          }
          Write-Host "Found installer at $($exe.FullName)"
          "exe_path=$($exe.FullName)" >> $env:GITHUB_OUTPUT
          "exe_name=$($exe.Name)" >> $env:GITHUB_OUTPUT

      - name: Upload Setup.exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: HirschNotify-Installer
          path: ${{ steps.find_exe.outputs.exe_path }}
          retention-days: 90

      # ── Derive release notes from the annotated tag ───
      # The HirschRelay update proxy exposes the release body to
      # installed instances, which show it in Settings → About.
      # Use the annotated tag's message as the source of truth:
      #
      #     git tag -a v1.0.11 -m "Release 1.0.11
      #
      #     - **Added:** Recipient contact method preview on the edit page.
      #     - **Fixed:** Velocity Adapter mode no longer drops the first event after reconnect."
      #
      # ─── Style guide for the tag annotation body ───
      # This text is read by CUSTOMERS in their Settings → About
      # accordion when they have an update available. Write it as
      # release notes, not a commit log:
      #
      #   - Describe user-visible behavior, not internal plumbing.
      #     "Fixed: version number in Settings → About" ✓
      #     "Refactored UpdateState.CurrentVersion to read InformationalVersion" ✗
      #   - Lead each bullet with a category in bold: **Added**,
      #     **Fixed**, **Changed**, **Removed**, **Security**.
      #   - Skip releases that are pure dev-internal plumbing with no
      #     user-visible change. If you can't describe it without
      #     using the word "refactor", it probably doesn't belong.
      #   - Short over long. One sentence per bullet. Markdown is
      #     rendered in both the GitHub UI and Settings → About.
      #
      # Priority:
      #   1. Tag annotation body (git `%(contents:body)` — everything
      #      after the first blank line in `git tag -a -m '...'`)
      #   2. Tag annotation subject (first line) if no body
      #   3. Commit messages since the previous tag, as a fallback
      #      for lightweight tags
      - name: Derive release notes from tag annotation
        id: notes
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          BODY=$(git tag -l --format='%(contents:body)' "$TAG")
          SUBJECT=$(git tag -l --format='%(contents:subject)' "$TAG")

          if [ -n "$BODY" ]; then
            NOTES="$BODY"
          elif [ -n "$SUBJECT" ]; then
            NOTES="$SUBJECT"
          else
            PREV=$(git describe --tags --abbrev=0 "$TAG^" 2>/dev/null || echo '')
            if [ -n "$PREV" ]; then
              NOTES=$(git log "$PREV..$TAG" --format='- %s' --no-merges)
            else
              NOTES="Initial release"
            fi
          fi

          echo "─── release notes for $TAG ───"
          echo "$NOTES"
          echo "──────────────────────────────"

          {
            echo 'notes<<ENDOFNOTES'
            echo "$NOTES"
            echo 'ENDOFNOTES'
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.find_exe.outputs.exe_path }}
          body: ${{ steps.notes.outputs.notes }}
          # generate_release_notes still appends GitHub's auto-generated
          # "Full Changelog: v1.0.10...v1.0.11" compare link at the
          # bottom, underneath the body we provide.
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
